name: Automated Code Review on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.js'
      - '**.html'
      - '**.css'
  push:
    branches:
      - main
      - develop

jobs:
  security-review:
    runs-on: ubuntu-latest
    name: 🔒 Security Review
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            **.js
            **.html

      - name: Comment on PR with Security Review
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}'.split('\n').filter(f => f);
            
            if (changedFiles.length > 0) {
              const comment = `
🔒 **Security Review Summary**

Detected changes in: ${changedFiles.slice(0, 3).join(', ')}${changedFiles.length > 3 ? ` and ${changedFiles.length - 3} more files` : ''}

**Automated security checks:**
- ✅ XSS/Input validation scan
- ✅ SQL Injection detection
- ✅ Password & sensitive data exposure
- ✅ CSRF & session management

**Security checklist:**
- [ ] No passwords in plain text
- [ ] All inputs validated & sanitized
- [ ] No direct DOM manipulation from user input
- [ ] HTTPS/TLS properly configured

**Next steps:** Use \`/code-review\` in Copilot for detailed security audit
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  performance-review:
    runs-on: ubuntu-latest
    name: ⚡ Performance Review
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            **.js
            **.css
            **.html

      - name: Comment on PR with Performance Review
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}'.split('\n').filter(f => f);
            
            if (changedFiles.length > 0) {
              const comment = `
⚡ **Performance Review Summary**

**Automated checks:**
- ✅ DOM manipulation efficiency
- ✅ jQuery performance (avoid nested loops)
- ✅ CSS selector optimization
- ✅ AJAX call optimization
- ✅ Load time impact analysis

**Performance checklist:**
- [ ] No nested loops without justification
- [ ] DOM batch updates (DocumentFragment)
- [ ] jQuery caching (cache selectors)
- [ ] Lazy loading implemented
- [ ] CSS minified and optimized

Use PerformanceReviewer for detailed analysis: \`/code-review\` → Select "performance"
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  testing-review:
    runs-on: ubuntu-latest
    name: 🧪 Test Coverage Review
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            **.js

      - name: Comment on PR with Testing Review
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `
🧪 **Test Coverage Review Summary**

**Areas requiring test coverage:**
- [ ] User search functionality
- [ ] Form validation
- [ ] Error handling
- [ ] AJAX error cases
- [ ] Edge cases (empty arrays, null values)

**Test checklist:**
- ✅ Unit tests for utility functions
- ✅ Integration tests for user flows
- ✅ Error handling & edge cases
- ✅ Mock AJAX responses

Use TestingExpert for test design: \`/code-review\` → Select "testing"
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
