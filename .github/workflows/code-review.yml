name: Dynamic Code Review Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  code-analysis:
    runs-on: ubuntu-latest
    name: Analyze Code Changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Dynamic Code Review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            try {
              // Get changed files
              let changedFiles = [];
              try {
                const output = execSync('git diff --name-only origin/main...HEAD').toString();
                changedFiles = output
                  .trim()
                  .split('\n')
                  .filter(f => (f.endsWith('.js') || f.endsWith('.ts')) && f.length > 0);
              } catch (e) {
                console.log('Could not get diff, using HEAD');
                changedFiles = [];
              }

              console.log('Changed files:', changedFiles);

              let findings = {
                security: [],
                performance: [],
                testing: []
              };

              // Analyze each changed file
              for (const file of changedFiles) {
                try {
                  if (!fs.existsSync(file)) continue;
                  const content = fs.readFileSync(file, 'utf8');

                  // SECURITY CHECKS
                  if (content.match(/["']SELECT.*\+|["']SELECT.*userid/gi)) {
                    findings.security.push(`**SQL Injection** in ${file} - String concatenation in query`);
                  }
                  if (content.match(/\.innerHTML\s*=|\.html\s*\([^)]*\$/gi)) {
                    findings.security.push(`**XSS Vulnerability** in ${file} - Direct HTML manipulation`);
                  }
                  if (content.match(/(api_?key|password|secret)\s*=\s*['"][a-zA-Z0-9]{8,}/gi)) {
                    findings.security.push(`**Hardcoded Credentials** in ${file} - Secrets in source code`);
                  }
                  if (content.match(/eval\s*\(\s*[^)]*\s*\)/gi)) {
                    findings.security.push(`**Code Injection** in ${file} - eval() detected`);
                  }

                  // PERFORMANCE CHECKS
                  if (content.match(/for\s*\([^)]*\)\s*{[^}]*for\s*\(/gi)) {
                    findings.performance.push(`**O(n²) Complexity** in ${file} - Nested loops`);
                  }
                  if (content.match(/\.html\s*\(|\.innerHTML\s*=/gi) && content.match(/for\s*\(/gi)) {
                    findings.performance.push(`**DOM Thrashing** in ${file} - Loop with DOM updates`);
                  }

                  // TESTING CHECKS
                  if (content.match(/fetch\s*\(/gi) && !content.match(/\.catch\s*\(|try\s*\{/gi)) {
                    findings.testing.push(`**Missing Error Handling** in ${file} - No .catch() on fetch`);
                  }
                  if (content.match(/function\s+\w+\s*\([^)]*\)\s*{[^}]*fetch/gi)) {
                    findings.testing.push(`**No Input Validation** in ${file} - No checks before network call`);
                  }
                } catch (e) {
                  console.log('Error reading file:', file);
                }
              }

              // Build report
              let report = '## 📊 Automated Code Review\n\n';
              report += `**Analyzed:** ${changedFiles.length} file(s)\n\n`;

              if (findings.security.length > 0) {
                report += '### 🔒 Security Issues Found\n';
                findings.security.forEach(issue => {
                  report += `- ${issue}\n`;
                });
                report += '\n';
              }

              if (findings.performance.length > 0) {
                report += '### ⚡ Performance Issues\n';
                findings.performance.forEach(issue => {
                  report += `- ${issue}\n`;
                });
                report += '\n';
              }

              if (findings.testing.length > 0) {
                report += '### 🧪 Testing Gaps\n';
                findings.testing.forEach(issue => {
                  report += `- ${issue}\n`;
                });
                report += '\n';
              }

              if (findings.security.length === 0 && findings.performance.length === 0 && findings.testing.length === 0) {
                report += '✅ **No issues detected!**\n\n';
              }

              report += '---\n💡 Use `/code-review` in Copilot for deeper analysis\n';

              console.log('Posting comment...');
              
              // Post comment
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });

              console.log('Analysis complete!');
            } catch (error) {
              console.error('Error:', error);
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '⚠️ Code review analysis error. Please use `/code-review` manually.'
              });
            }
